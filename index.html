<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Stackly</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
    }
    html,body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow-x: hidden;
    }
    .container{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
    }
    .logo{
        width: 250px;
        height: 90px;
    }
    .logo img{
        width: 100%;
        height: 100%;
        object-fit: cover;

    }
   .loader {
    position: absolute;
    width: 300px;
    height: 300px;
    border: 16px solid #f3f3f3;
    border-top: 16px solid green;
    border-radius: 50%;
    animation: spin 2s linear infinite;
}
    @-webkit-keyframes spin{
        0%{
            transform: rotate(0deg);
        }
        100%{
            transform: rotate(360deg);
        }
    }
    @keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@media (max-width:400px) {
    .logo{
        width: 180px;
        height: 70px;
    }
    .container p{
        font-size: 10px;
    }
    .loader {
    width: 200px;
    height: 200px; 
}
}
</style>
<body>
    <div class="container">
        <div class="logo">
            <img src="./src/logo/Untitled design (7)-compressed.webp" alt="">
        </div>
        <p>Loading The Site</p>
    </div>
    <div class="loader">
    </div>
    <script>
       setTimeout(()=>{
        window.location.href="home.html"
       },3000)
    </script>
</body>
</html>
