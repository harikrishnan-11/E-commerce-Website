<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Stackly</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="error.css">

    <style>
        /* =========================================================
   ERROR.CSS — Standalone stylesheet for 404.html
   Load AFTER style.css + nav.css. No dependency on pages.css.
========================================================= */

/* ---------- Generic section wrapper + button (needed by this page) ---------- */
.section{ max-width:1400px; margin:0 auto; padding:10px 30px 60px; }

.btn-primary{
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  background:var(--btn-primary); color:var(--white); font-weight:700; font-size:14px;
  padding:14px 26px; border-radius:30px; border:none; cursor:pointer;
  transition:background .2s var(--ease), transform .2s var(--ease), box-shadow .2s var(--ease);
}
.btn-primary:hover{ background:var(--btn-primary-hover); transform:translateY(-2px); box-shadow:var(--shadow-md); }
.btn-primary:active{ transform:translateY(0); }

/* =========================================================
   404 ERROR PAGE
========================================================= */
.error-shell{
  max-width:720px; margin:0 auto; padding:70px 30px 90px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}

.error-visual{
  position:relative; width:260px; height:260px; display:flex; align-items:center; justify-content:center; margin-bottom:10px;
}
.error-visual .e-ring{
  position:absolute; inset:0; border-radius:50%; border:2px dashed var(--border); animation:errSpin 22s linear infinite;
}
.error-visual .e-glow{
  position:absolute; width:180px; height:180px; border-radius:50%;
  background:radial-gradient(circle, rgba(22,198,12,.18), transparent 70%);
}
.error-visual .e-code{
  position:relative; z-index:1; font-size:76px; font-weight:800; color:var(--text-primary); letter-spacing:-2px; line-height:1;
}
.error-visual .e-code span{ color:var(--primary); }
.error-visual .e-icon{
  position:absolute; z-index:1; width:52px; height:52px; border-radius:50%; background:var(--white); box-shadow:var(--shadow-md);
  display:flex; align-items:center; justify-content:center; color:var(--primary); font-size:18px;
  animation:errFloat 4.5s var(--ease) infinite;
}
.error-visual .e-icon.i1{ top:6px; left:6px; animation-delay:0s; }
.error-visual .e-icon.i2{ bottom:14px; right:0; animation-delay:1.2s; color:var(--danger); }
.error-visual .e-icon.i3{ top:44%; right:-6px; animation-delay:2.2s; color:var(--info); }

@keyframes errSpin{ to{ transform:rotate(360deg); } }
@keyframes errFloat{
  0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-12px); }
}

.error-shell h1{ font-size:clamp(22px,3vw,28px); font-weight:800; margin-top:6px; }
.error-shell p.e-sub{ font-size:14px; color:var(--text-secondary); max-width:440px; margin:8px 0 26px; line-height:1.7; }

.error-search{
  display:flex; align-items:center; background:var(--white); border:1.5px solid var(--border); border-radius:30px;
  padding:0 6px 0 20px; width:100%; max-width:460px; margin-bottom:26px; transition:border-color .2s var(--ease), box-shadow .2s var(--ease);
}
.error-search:focus-within{ border-color:var(--primary); box-shadow:0 0 0 4px rgba(22,198,12,.12); }
.error-search input{ border:none; outline:none; flex:1; padding:13px 8px; font-size:13.5px; background:transparent; }
.error-search button{
  background:var(--primary); color:var(--white); width:38px; height:38px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:background .2s var(--ease);
}
.error-search button:hover{ background:var(--primary-dark); }

.error-actions{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:36px; }
.btn-dark-outline{
  display:inline-flex; align-items:center; gap:9px; padding:13px 24px; border-radius:30px; border:1.5px solid var(--border);
  font-size:13.5px; font-weight:700; color:var(--text-primary); transition:border-color .2s var(--ease), transform .2s var(--ease), background .2s var(--ease);
}
.btn-dark-outline:hover{ border-color:var(--secondary); background:var(--light-gray); transform:translateY(-2px); }

.error-quicklinks{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.error-quicklinks a{
  font-size:12.5px; font-weight:700; color:var(--text-secondary); background:var(--white); border:1px solid var(--border);
  padding:9px 16px; border-radius:20px; transition:background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease), transform .2s var(--ease);
}
.error-quicklinks a:hover{ background:var(--primary); color:var(--white); border-color:var(--primary); transform:translateY(-2px); }

/* Entrance animation for this page's content */
@keyframes errFadeUp{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}
.error-shell > *{ animation:errFadeUp .7s var(--ease) both; }
.error-shell > *:nth-child(1){ animation-delay:.05s; }
.error-shell > *:nth-child(2){ animation-delay:.15s; }
.error-shell > *:nth-child(3){ animation-delay:.25s; }
.error-shell > *:nth-child(4){ animation-delay:.35s; }
.error-shell > *:nth-child(5){ animation-delay:.45s; }

/* =========================================================
   RESPONSIVE
========================================================= */
@media (max-width:768px){
  .section{ padding:6px 20px 46px; }
  .error-shell{ padding:50px 20px 60px; }
}
@media (max-width:640px){
  .error-visual{ width:200px; height:200px; }
  .error-visual .e-code{ font-size:56px; }
  .error-visual .e-icon{ width:42px; height:42px; font-size:15px; }
  .error-actions{ flex-direction:column; width:100%; }
  .error-actions .btn-primary, .error-actions .btn-dark-outline{ width:100%; justify-content:center; }
}
@media (max-width:420px){
  .error-visual{ width:170px; height:170px; }
  .error-visual .e-code{ font-size:46px; }
  .error-shell h1{ font-size:20px; }
  .error-quicklinks a{ font-size:11.5px; padding:8px 13px; }
}

@media (prefers-reduced-motion: reduce){
  .error-visual .e-ring, .error-visual .e-icon, .error-shell > *{
    animation-duration:.001ms !important;
  }
}
    </style>
</head>
<body>

<div class="section">
  <div class="error-shell">

    <div class="error-visual reveal">
      <div class="e-ring"></div>
      <div class="e-glow"></div>
      <div class="e-code">4<span>0</span>4</div>
      <div class="e-icon i1"><i class="fa-solid fa-box-open"></i></div>
      <div class="e-icon i2"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div class="e-icon i3"><i class="fa-solid fa-magnifying-glass"></i></div>
    </div>

    <h1>This page took a wrong turn in shipping</h1>
    <p class="e-sub">We couldn't find the page you're looking for. It may have been moved, sold out, or the link might just be broken. Let's get you back on track.</p>

   

    <div class="error-actions">
      <a href="./home.html" class="btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
      <a href="./contact.html" class="btn-dark-outline"><i class="fa-solid fa-headset"></i> Contact Support</a>
    </div>

    <div class="error-quicklinks reveal">
      <a href="./products.html">Products</a>
      <a href="./about.html">About Us</a>
      <a href="./services.html">Services</a>
      <a href="./blog.html">Blog</a>
      <a href="./contact.html">Contact</a>
    </div>

  </div>
</div>


<script>
    /* =========================================================
   ERROR.JS — Standalone script for 404.html
   Handles only the "search for products" redirect on this page.
   Nav hamburger / scroll-reveal / scroll-to-top still come from navbar.js.
========================================================= */
(function(){
  "use strict";

  const errorSearchForm = document.getElementById("errorSearchForm");
  if(errorSearchForm){
    errorSearchForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const input = errorSearchForm.querySelector("input");
      const q = (input?.value || "").trim();
      window.location.href = "./products.html" + (q ? ("?search=" + encodeURIComponent(q)) : "");
    });
  }

})();
</script>
</body>
</html>
